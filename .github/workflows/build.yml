name: CI (DevContainer Build & Test)

on:
  workflow_call:
    inputs:
      depsight_version:
        description: "Depsight version from pyproject.toml (e.g. 1.2.3)."
        required: true
        type: string
      is_release:
        description: "Whether this is a release build (uploads wheel to GitHub Release)."
        required: false
        type: boolean
      upload_artifacts:
        description: "Upload wheel as a workflow artifact"
        required: false
        type: boolean
      uv_version:
        description: "uv version to install in the DevContainer (e.g. 0.10.9)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: ${{ inputs.uv_version }}

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify depsight_version matches pyproject.toml
        env:
          VERSION: ${{ inputs.depsight_version }}
        run: |
          set -euo pipefail

          echo "::group::Version check"

          toml_version=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Input version: '$VERSION'"
          echo "pyproject.toml version: '$toml_version'"

          if [[ "$VERSION" != "$toml_version" ]]; then
            echo "::error::Input version '$VERSION' does not match pyproject.toml version '$toml_version'"
            exit 1
          fi

          echo "Versions match ('$VERSION')"

          echo "::endgroup::"

      - name: Lint, test & build wheel
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |

            set -e

            echo "::group::Environment"
            python --version
            pip --version
            which python
            echo "::endgroup::"

            source .venv/bin/activate

            echo "::group::CLI health check"
            depsight --help
            echo "::endgroup::"

            echo "::group::Ruff linting"
            ruff check src/ tests/
            echo "::endgroup::"

            echo "::group::Type checking"
            mypy src/
            echo "::endgroup::"

            echo "::group::Pytest"
            python -m pytest tests/ -v --tb=short
            echo "::endgroup::"

            echo "::group::Build wheel"
            uv build
            ls -lah dist
            echo "::endgroup::"

      - name: Provide wheel as workflow artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: depsight-wheel
          path: dist/*.whl
          retention-days: 14
          if-no-files-found: error

      - name: Upload wheel to GitHub Release
        if: ${{ inputs.is_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.depsight_version }}" dist/*.whl --clobber
