name: On Pull Request

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  parse-version:
    runs-on: ubuntu-latest
    outputs:
      depsight_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          version=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  call-build:
    needs: parse-version
    uses: ./.github/workflows/build.yml
    with:
      depsight_version: ${{ needs.parse-version.outputs.depsight_version }}
      upload_artifacts: false
      uv_version: "0.10.9"
