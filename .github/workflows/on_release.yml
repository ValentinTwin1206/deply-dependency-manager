name: On Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      depsight_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Verify PEP 440 compliance
          if ! echo "$TAG" | grep -qP '^(\d+!)?(\d+)(\.(\d+))*(\.(a|b|rc)\d+)?(\.post\d+)?(\.dev\d+)?$'; then
            echo "::error::Tag '$TAG' is not PEP 440 compliant"
            exit 1
          fi

          echo "Tag '$TAG' is PEP 440 compliant"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  call-build:
    needs: verify-tag
    uses: ./.github/workflows/build.yml
    with:
      depsight_version: ${{ needs.verify-tag.outputs.depsight_version }}
      is_release: true
      upload_artifacts: false
      uv_version: "0.10.9"
