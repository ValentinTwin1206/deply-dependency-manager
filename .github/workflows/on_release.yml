name: On Release

on:
  release:
    types: [published]

permissions:
  actions: read
  contents: write
  # Required so the reusable build workflow can mint an OIDC token for
  # PyPI Trusted Publishing.
  id-token: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      depsight_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin the checkout to the exact release tag for clarity and to
          # guard against main drifting between tag creation and publish.
          ref: ${{ github.event.release.tag_name }}
      - id: check
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Verify PEP 440 compliance
          if ! echo "$TAG" | grep -qP '^(\d+!)?(\d+)(\.(\d+))*(\.(a|b|rc)\d+)?(\.post\d+)?(\.dev\d+)?$'; then
            echo "::error::Tag '$TAG' is not PEP 440 compliant"
            exit 1
          fi

          echo "Tag '$TAG' is PEP 440 compliant"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  call-build:
    needs: verify-tag
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      is_release: true
      uv_version: "0.11.1"
      depsight_version: ${{ github.event.release.tag_name }}
    secrets:
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
