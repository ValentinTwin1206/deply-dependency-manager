site_name: Depsight - Dependency Analysis Framework
site_description: A modular dependency analysis framework for local workspaces

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

nav:
  - Development: development/index.md
  - Instructions:
      - Getting Started:
          - Getting Started: instructions/getting-started/getting-started.md
      - Tasks:
          - "Task 1: Write an NPM Plugin": instructions/tasks/task-1-write-a-npm-plugin.md
          - "Task 2: Package and Publish Your Plugin": instructions/tasks/task-2-package-and-publish-your-plugin.md
          - "Task 3: Scan Dependencies": instructions/tasks/task-3-scan-dependencies.md
